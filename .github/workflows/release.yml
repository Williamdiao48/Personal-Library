name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14        # Apple Silicon (arm64)
            platform: mac
          - os: windows-latest  # x64
            platform: win
          - os: ubuntu-latest   # x64
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: |
          if [ "${{ matrix.platform }}" = "mac" ]; then
            npx electron-rebuild -f -w better-sqlite3 --arch universal
          else
            npx electron-rebuild -f -w better-sqlite3
          fi
        shell: bash

      - name: Build
        run: npm run build

      - name: Package & Publish (${{ matrix.platform }})
        run: |
          if [ "${{ matrix.platform }}" = "mac" ]; then
            npx electron-builder --mac --arch universal --publish always
          else
            npx electron-builder --${{ matrix.platform }} --publish always
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # To enable code signing, add secrets to GitHub and uncomment:
        # env:
        #   GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        #   CSC_LINK: ${{ secrets.CSC_LINK }}
        #   CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        #   APPLE_ID: ${{ secrets.APPLE_ID }}
        #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        #   APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
