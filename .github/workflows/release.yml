name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14 # Apple Silicon (arm64)
            platform: mac
            arch: arm64
            arch_flag: --arm64
          - os: macos-15-intel # Intel (x64)
            platform: mac
            arch: x64
            arch_flag: --x64
          - os: windows-latest # x64
            platform: win
            arch: ''
            arch_flag: ''
          - os: ubuntu-latest # x64
            platform: linux
            arch: ''
            arch_flag: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3

      # Vendor the embedding model into resources/models (gitignored, not in the
      # checkout) BEFORE packaging — electron-builder copies it via extraResources.
      # Without this the published app ships with no model and Discover is dead.
      - name: Fetch embedding model
        run: npm run fetch:model

      - name: Build
        run: npm run build

      - name: Package & Publish (${{ matrix.platform }} ${{ matrix.arch }})
        run: npx electron-builder --${{ matrix.platform }} ${{ matrix.arch_flag }} --publish always
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # To enable code signing, add secrets to GitHub and uncomment:
        # env:
        #   GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        #   CSC_LINK: ${{ secrets.CSC_LINK }}
        #   CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        #   APPLE_ID: ${{ secrets.APPLE_ID }}
        #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        #   APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
